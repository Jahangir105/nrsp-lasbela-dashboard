<!DOCTYPE html>
<html>
<head>
  <title>NRSP Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<h2>NRSP Dashboard</h2>

<table border="1" id="table"></table>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvbxo0dd0zyRt1O-nq22s1y_774oZQhfCgfRejLJ8cF4FszmGgmFF_3bUQYb-1Y51mS7GPoi31iqPE/pub?gid=835867956&single=true&output=csv";

fetch(url)
.then(res => res.text())
.then(data => {
  const parsed = Papa.parse(data).data;

  let html = "<tr>";
  parsed[0].forEach(h => html += `<th>${h}</th>`);
  html += "</tr>";

  parsed.slice(1).forEach(row => {
    html += "<tr>";
    row.forEach(cell => html += `<td>${cell}</td>`);
    html += "</tr>";
  });

  document.getElementById("table").innerHTML = html;
});
</script>

</body>
</html>
